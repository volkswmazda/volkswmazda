<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Volkswmazda · Acceso al Sistema</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="login.css"/>
<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<!-- Firebase config centralizado -->
<script src="app.js"></script>
<!-- Lógica de login -->
<script src="login.js" defer></script>
</head>
<body>

<!-- ======================================================
     PANTALLA: LOADING FIREBASE
     ====================================================== -->
<div class="firebase-loading" id="firebase-loading">
  <div class="fb-spinner"></div>
  <div class="fb-loading-text">Iniciando sistema...</div>
</div>

<!-- ======================================================
     OVERLAY: REDIRECT TRAS LOGIN EXITOSO
     ====================================================== -->
<div class="redirect-overlay" id="redirect-overlay">
  <div class="redirect-icon">
    <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="var(--acc)" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
  </div>
  <div class="redirect-title" id="redirect-name">Bienvenido</div>
  <div class="redirect-role" id="redirect-role">Cargando...</div>
  <div class="redirect-msg" id="redirect-msg">Redirigiendo al sistema...</div>
</div>

<!-- ======================================================
     PANTALLA: LOGIN
     ====================================================== -->
<div class="screen active" id="screen-login">

  <!-- Fondo / video -->
  <div class="login-video-wrap">
    <video id="bg-video" autoplay muted loop playsinline preload="metadata">
      <source src="./Assets/videos/video2.mp4" type="video/mp4">
      <source src="./Assets/videos/video2.mp4" type="video/quicktime">
    </video>
  </div>
  <div class="grid-overlay"></div>
  <div class="scan-line"></div>

  <!-- Partículas -->
  <div id="particles-wrap"></div>

  <!-- ── Lado izquierdo: branding ── -->
  <div class="login-brand">
    <div class="brand-logo">
      <!-- Logo clicable → va a la página web -->
      <a href="index.html" class="brand-logo-link" title="Ir al sitio web">
        <img src="logo.png" alt="Volkswmazda" style="height:15vh;width:auto;object-fit:contain;filter:brightness(0) invert(1);margin-bottom:8px"/>
        <div class="brand-city">Tunja · Boyacá · Colombia</div>
        <div class="brand-web-hint">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M15 3h6v6M10 14L21 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Ver sitio web
        </div>
      </a>
    </div>

    <div class="hero-headline">
      SERVICIO<br>
      <em>AUTOMOTRIZ</em>
      ESPECIALIZADO
    </div>

  
  </div>

  <!-- ── Lado derecho: panel de autenticación ── -->
  <div class="login-panel">
    <div class="login-card">
      <!-- Logo solo visible en mobile — clicable → sitio web -->
      <div class="mobile-logo" style="display:none" id="mobile-logo">
        <a href="index.html" class="brand-logo-link" title="Ir al sitio web">
          <img src="logo.png" alt="Volkswmazda" onerror="this.style.opacity=0"/>
          <div class="brand-city">Tunja · Boyacá · Colombia</div>
          <div class="brand-web-hint">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M15 3h6v6M10 14L21 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Ver sitio web
          </div>
        </a>
      </div>

      <div class="lc-header">
        <div class="lc-icon">
          <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
          </svg>
        </div>
        <div class="lc-title">Acceso al Sistema</div>
      </div>

      <!-- Error -->
      <div class="lc-error" id="login-err">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="flex-shrink:0">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="login-err-msg">Credenciales incorrectas.</span>
      </div>

      <!-- Formulario -->
      <div class="lc-form" id="login-form">
        <div class="lf-group">
          <div class="lf-label">Correo electrónico</div>
          <div class="lf-wrap">
            <svg class="lf-icon" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <input class="lf-input" id="login-user" type="email"
              placeholder="correo@volkswmazda.com" autocomplete="email" required/>
          </div>
        </div>

        <div class="lf-group">
          <div class="lf-label">Contraseña</div>
          <div class="lf-wrap">
            <svg class="lf-icon" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            <input class="lf-input" id="login-pass" type="password"
              placeholder="••••••••" autocomplete="current-password" required/>
            <button class="eye-btn" id="eye-btn" type="button" title="Ver contraseña">
              <svg id="eye-icon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="btn-login" id="btn-login" type="button">
          <span id="btn-login-txt">INGRESAR AL SISTEMA</span>
          <div class="spin" id="btn-login-spin" style="display:none"></div>
        </button>
      </div>

      <div class="lc-footer">
        Diseñado por <span>Sotelo</span>
      </div>

    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

</body>
</html>
